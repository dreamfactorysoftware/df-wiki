name: Update GitHub Releases

on:
  schedule:
    - cron: '15 */6 * * *'  # Every 6 hours at :15
  workflow_dispatch:

jobs:
  update-releases:
    name: Update DreamFactory Releases
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Update GitHub releases on wiki
        working-directory: scripts
        env:
          WIKI_URL: ${{ secrets.WIKI_URL }}
          WIKI_USER: ${{ secrets.WIKI_USER }}
          WIKI_PASSWORD: ${{ secrets.WIKI_PASSWORD }}
        run: python update_releases.py
